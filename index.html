    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a1a1a 0%, #2d2416 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; position: relative; }
        .header { background: linear-gradient(135deg, #1a1a1a 0%, #2d2416 100%); color: #d4af37; padding: 20px 30px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 20px; position: relative; }
        .header img { width: 80px; height: 80px; object-fit: contain; }
        .header-text { display: flex; flex-direction: column; align-items: center; }
        .header h1 { font-size: 2.5em; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); color: #d4af37; }
        .header p { color: #c5a572; }
        .login-container { background: white; max-width: 500px; margin: 100px auto; padding: 40px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); text-align: center; }
        .role-btn { display: block; width: 100%; padding: 15px; margin-bottom: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; border: 2px solid #ddd; background: #f8f9fa; color: #1e3c72; cursor: pointer; transition: all 0.3s; }
        .role-btn:hover { border-color: #d4af37; background: #fffbef; transform: translateY(-2px); }
        .tabs { display: flex; background: #f5f5f5; border-bottom: 2px solid #ddd; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tabs::-webkit-scrollbar { height: 4px; }
        .tabs::-webkit-scrollbar-thumb { background: #c5a572; border-radius: 4px; }
        .tab { flex: 1 0 auto; min-width: 130px; padding: 15px; text-align: center; cursor: pointer; background: #e0e0e0; border: none; font-size: 16px; font-weight: 600; transition: all 0.3s; }
        .tab:hover { background: #d0d0d0; }
        .tab.active { background: white; border-bottom: 3px solid #d4af37; }
        .tab.admin-tab { background: #1e293b; color: white; border-bottom: none; }
        .tab.admin-tab.active { background: #0f172a; border-bottom: 3px solid #ef4444; }
        .content { padding: 30px; min-height: 500px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input[type="text"], input[type="password"], input[type="number"], textarea, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; transition: border-color 0.3s; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #667eea; }
        input:disabled, select:disabled { background: #f1f5f9; cursor: not-allowed; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-right: 10px; }
        .btn-primary { background: #d4af37; color: #1a1a1a; font-weight: 700; }
        .btn-primary:hover { background: #c5a03d; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .team-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .team-card { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid #667eea; font-weight: bold; }
        .team-card.goat { border-left-color: #10b981; background: #ecfdf5; }
        .match-grid { display: grid; gap: 15px; margin-top: 20px; }
        .match-card { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 2px solid #ddd; }
        .match-card.bonus { border-color: #f59e0b; background: #fffbeb; }
        .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .match-type { font-weight: 700; color: #1e3c72; font-size: 16px; }
        .match-time { background: #667eea; color: white; padding: 5px 12px; border-radius: 6px; font-size: 14px; }
        .checkbox-container { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        input[type="checkbox"] { width: 24px; height: 24px; cursor: pointer; }
        input[type="checkbox"]:disabled { cursor: not-allowed; opacity: 0.5; }
        .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-radius: 8px; }
        .stats-table { width: 100%; border-collapse: collapse; min-width: 600px; }
        .stats-table th, .stats-table td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .stats-table th { background: #f5f5f5; font-weight: 700; color: #1e3c72; }
        .stats-table tr:hover { background: #f9fafb; }
        .warning { background: #fef3c7; border: 2px solid #f59e0b; padding: 15px; border-radius: 8px; margin: 15px 0; color: #92400e; font-weight: 600; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 10px; }
        .modal-content { background: white; padding: 30px; border-radius: 16px; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-size: 24px; font-weight: 700; margin-bottom: 20px; color: #1e3c72; }
        .date-section { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; transition: all 0.3s ease; }
        .date-header { font-size: 20px; font-weight: 700; color: #1e3c72; margin-bottom: 15px; }
        .player-count-warning { color: #dc2626; font-size: 12px; margin-top: 5px; }
        .success-message { background: #d1fae5; border: 2px solid #10b981; padding: 15px; border-radius: 8px; margin: 15px 0; color: #065f46; font-weight: 600; }
        .captain-badge { background: #f59e0b; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 8px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .grid-2 > div { min-width: 0; }
        .user-menu { position: absolute; top: 20px; right: 20px; display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 20px; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { flex-direction: column; padding: 15px; padding-top: 70px; }
            .header h1 { font-size: 2em; text-align: center; }
            .user-menu { top: 10px; right: 10px; padding: 5px 10px; }
            .content { padding: 15px; }
            .grid-2 { grid-template-columns: 1fr; gap: 15px; }
            .flex-mobile-col { flex-direction: column !important; align-items: stretch !important; }
            .btn-responsive { width: 100%; margin-bottom: 10px; margin-right: 0 !important; }
            .match-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .modal-content { padding: 20px; }
            .team-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="js/constants.js"></script>
    <script src="js/logic.js"></script>

    <script type="text/babel" src="js/plantel.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Extraer variables globales de window
        const { 
            ID_PROYECTO, CATEGORIAS_DISPONIBLES, ORDEN_CATS, 
            NOMBRES_CATS, MAX_POR_CATEGORIA, EQUIPOS_POR_DEFECTO 
        } = window.AppConstants;

        const { calcularTablaZona } = window.AppLogic;
        const { renderPlantelSlots } = window.AppPlantel;

        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDWut5pII90tdvaB_AwkvdQ6Oq3TgM5wKY",
            authDomain: "hub-universitario.firebaseapp.com",
            databaseURL: "https://hub-universitario-default-rtdb.firebaseio.com",
            projectId: "hub-universitario",
            storageBucket: "hub-universitario.firebasestorage.app",
            messagingSenderId: "642915679228",
            appId: "1:642915679228:web:e6e48b25869d74c14cfe87"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const database = firebase.database();
        const FIREBASE_PATH = `torneos/${ID_PROYECTO}`;

        const guardarEnFirebase = async (datos) => {
            const syncTime = new Date().toISOString();
            await database.ref(`${FIREBASE_PATH}/datos`).set({ ...datos, ultimaActualizacion: syncTime });
            return syncTime;
        };

        const cargarDesdeFirebase = () => {
            return database.ref(`${FIREBASE_PATH}/datos`).once('value').then(snapshot => snapshot.val());
        };

        const escucharCambiosFirebase = (callback) => {
            const ref = database.ref(`${FIREBASE_PATH}/datos`);
            ref.on('value', (snapshot) => {
                const datos = snapshot.val();
                if (datos) callback(datos);
            });
            return () => ref.off('value');
        };

        const guardarConfigFirebase = async (config) => {
            await database.ref(`${FIREBASE_PATH}/config`).set(config);
        };

        const cargarConfigFirebase = () => {
            return database.ref(`${FIREBASE_PATH}/config`).once('value').then(snapshot => snapshot.val());
        };

        const PARTIDOS = [
            { id: 9, tipo: "Dobles Damas A/B", categorias: ["damas_a", "damas_b"], numJugadores: 2, grupo: "damas" },
            { id: 21, tipo: "Dobles Damas A", categorias: ["damas_a"], numJugadores: 2, grupo: "damas" },
            { id: 16, tipo: "Dobles Damas B", categorias: ["damas_b"], numJugadores: 2, grupo: "damas" },
            { id: 26, tipo: "Dobles Damas B/C", categorias: ["damas_b", "damas_c"], numJugadores: 2, grupo: "damas" },
            { id: 1, tipo: "Dobles Damas C-1", categorias: ["damas_c"], numJugadores: 2, grupo: "damas" },
            { id: 22, tipo: "Dobles Damas C-2", categorias: ["damas_c"], numJugadores: 2, grupo: "damas" },
            { id: 4, tipo: "Mixto D (Dama A + Caballero 2da)", categorias: ["damas_a", "caballeros_2da"], numJugadores: 2, mixto: true, grupo: "mixtos" },
            { id: 14, tipo: "Mixto A (Dama A + Caballero 3ra)", categorias: ["damas_a", "caballeros_3ra"], numJugadores: 2, mixto: true, grupo: "mixtos" },
            { id: 19, tipo: "Mixto B (Dama B + Caballero 4ta)", categorias: ["damas_b", "caballeros_4ta"], numJugadores: 2, mixto: true, grupo: "mixtos" },
            { id: 11, tipo: "Mixto E (Dama B + Caballero 5ta)", categorias: ["damas_b", "caballeros_5ta"], numJugadores: 2, mixto: true, grupo: "mixtos" },
            { id: 8, tipo: "Mixto C (Dama C + Caballero 5ta)", categorias: ["damas_c", "caballeros_5ta"], numJugadores: 2, mixto: true, grupo: "mixtos" },
            { id: 20, tipo: "Single Caballero 2da", categorias: ["caballeros_2da"], numJugadores: 1, grupo: "singles" },
            { id: 10, tipo: "Single Caballero 3ra", categorias: ["caballeros_3ra"], numJugadores: 1, grupo: "singles" },
            { id: 6, tipo: "Single Caballero 4ta", categorias: ["caballeros_4ta"], numJugadores: 1, grupo: "singles" },
            { id: 24, tipo: "Single Caballero 5ta", categorias: ["caballeros_5ta"], numJugadores: 1, grupo: "singles" },
            { id: 7, tipo: "Dobles Caballeros 2da/2da", categorias: ["caballeros_2da"], numJugadores: 2, grupo: "dobles_puros" },
            { id: 15, tipo: "Dobles Caballeros 2da", categorias: ["caballeros_2da"], numJugadores: 2, grupo: "dobles_puros" },
            { id: 5, tipo: "Dobles Caballeros 3ra/3ra", categorias: ["caballeros_3ra"], numJugadores: 2, grupo: "dobles_puros" },
            { id: 18, tipo: "Dobles Caballeros 3ra", categorias: ["caballeros_3ra"], numJugadores: 2, grupo: "dobles_puros" },
            { id: 12, tipo: "Dobles Caballeros 4ta/4ta", categorias: ["caballeros_4ta"], numJugadores: 2, grupo: "dobles_puros" },
            { id: 23, tipo: "Dobles Caballeros 4ta", categorias: ["caballeros_4ta"], numJugadores: 2, grupo: "dobles_puros" },
            { id: 3, tipo: "Dobles Caballeros 5ta/5ta", categorias: ["caballeros_5ta"], numJugadores: 2, grupo: "dobles_puros" },
            { id: 13, tipo: "Dobles Caballeros 5ta", categorias: ["caballeros_5ta"], numJugadores: 2, grupo: "dobles_puros" },
            { id: 25, tipo: "Dobles Caballeros 2da/3ra", categorias: ["caballeros_2da", "caballeros_3ra"], numJugadores: 2, grupo: "dobles_combinados" },
            { id: 2, tipo: "Dobles Caballeros 3ra/4ta", categorias: ["caballeros_3ra", "caballeros_4ta"], numJugadores: 2, grupo: "dobles_combinados" },
            { id: 17, tipo: "Dobles Caballeros 4ta/5ta", categorias: ["caballeros_4ta", "caballeros_5ta"], numJugadores: 2, grupo: "dobles_combinados" }
        ];

        // ── SETUP WIZARD ──
        function SetupWizard({ onSetupComplete }) {
            const [paso, setPaso] = useState(1);
            const [guardando, setGuardando] = useState(false);
            const [error, setError] = useState('');
            const [nombreEquipo, setNombreEquipo] = useState('');
            const [descripcion, setDescripcion] = useState('');
            const [pinCapitan, setPinCapitan] = useState('');
            const [pinCapitanConf, setPinCapitanConf] = useState('');
            const [pinAdmin, setPinAdmin] = useState('');
            const [pinAdminConf, setPinAdminConf] = useState('');
            const [jugadores, setJugadores] = useState([]);

            const validarPaso1 = () => { if (!nombreEquipo.trim()) { setError('El nombre del equipo es obligatorio.'); return false; } setError(''); return true; };
            const validarPaso2 = () => { if (pinCapitan.length < 4) { setError('El PIN de Capitán debe tener al menos 4 dígitos.'); return false; } if (pinCapitan !== pinCapitanConf) { setError('Los PINs de Capitán no coinciden.'); return false; } if (pinAdmin.length < 4) { setError('El PIN de Admin debe tener al menos 4 dígitos.'); return false; } if (pinAdmin !== pinAdminConf) { setError('Los PINs de Admin no coinciden.'); return false; } if (pinCapitan === pinAdmin) { setError('El PIN de Capitán y de Admin deben ser distintos.'); return false; } setError(''); return true; };
            const validarPaso3 = () => { if (jugadores.length === 0) { setError('Agregá al menos un jugador al plantel.'); return false; } setError(''); return true; };

            const avanzar = () => { const validadores = { 1: validarPaso1, 2: validarPaso2, 3: validarPaso3 }; if (validadores[paso]()) setPaso(p => p + 1); };

            const guardarConfig = async () => {
                if (!validarPaso3()) return;
                setGuardando(true); setError('');
                try {
                    const plantel = {};
                    jugadores.forEach(j => {
                        if (!plantel[j.categoria]) plantel[j.categoria] = [];
                        plantel[j.categoria].push({ nombre: j.nombre, categoria: j.categoria, capitan: j.capitan });
                    });
                    const config = { nombreEquipo: nombreEquipo.trim(), descripcion: descripcion.trim(), pinCapitan, pinAdmin, plantel, setupCompletado: true, fechaCreacion: new Date().toISOString() };
                    await guardarConfigFirebase(config);
                    onSetupComplete(config);
                } catch (e) { setError('Error al guardar en Firebase. Verificá tu conexión.'); } 
                finally { setGuardando(false); }
            };

            const progreso = Math.round(((paso - 1) / 3) * 100);

            return (
                <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)', padding: '20px' }}>
                    <div style={{ background: 'white', borderRadius: '20px', padding: '40px', maxWidth: '620px', width: '100%', boxShadow: '0 30px 80px rgba(0,0,0,0.5)' }}>
                        <div style={{ textAlign: 'center', marginBottom: '32px' }}>
                            <div style={{ fontSize: '48px', marginBottom: '12px' }}>🎾</div>
                            <h1 style={{ color: '#0f2027', fontSize: '26px', margin: 0 }}>Configuración Inicial</h1>
                            <p style={{ color: '#64748b', marginTop: '8px', fontSize: '14px' }}>ID de proyecto: <code style={{background:'#f1f5f9', padding:'2px 8px', borderRadius:'4px', fontWeight:'700', color:'#203a43'}}>{ID_PROYECTO}</code></p>
                        </div>
                        <div style={{ marginBottom: '32px' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '6px' }}>
                                {['Equipo', 'PINs', 'Plantel'].map((label, i) => (<span key={i} style={{ fontSize: '12px', fontWeight: '600', color: paso > i ? '#10b981' : paso === i + 1 ? '#203a43' : '#94a3b8' }}>{paso > i + 1 ? '✅' : paso === i + 1 ? '▶' : '○'} {label}</span>))}
                            </div>
                            <div style={{ height: '6px', background: '#e2e8f0', borderRadius: '3px', overflow: 'hidden' }}><div style={{ height: '100%', borderRadius: '3px', background: 'linear-gradient(90deg, #10b981, #059669)', width: `${progreso}%`, transition: 'width 0.4s ease' }} /></div>
                        </div>

                        {paso === 1 && (
                            <div>
                                <h2>Paso 1 — Tu Equipo</h2>
                                <div className="form-group"><label>Nombre *</label><input type="text" value={nombreEquipo} onChange={e => setNombreEquipo(e.target.value)} autoFocus /></div>
                                <div className="form-group"><label>Descripción (opcional)</label><input type="text" value={descripcion} onChange={e => setDescripcion(e.target.value)} /></div>
                            </div>
                        )}
                        {paso === 2 && (
                            <div>
                                <h2>Paso 2 — PINs de Acceso</h2>
                                <div style={{background:'#f8fafc', padding:'20px', marginBottom:'20px', border:'1px solid #e2e8f0', borderRadius: '8px'}}>
                                    <p>⭐ PIN de Capitán</p>
                                    <input type="password" value={pinCapitan} onChange={e => setPinCapitan(e.target.value)} placeholder="PIN" style={{marginBottom:'10px'}} />
                                    <input type="password" value={pinCapitanConf} onChange={e => setPinCapitanConf(e.target.value)} placeholder="Confirmar PIN" />
                                </div>
                                <div style={{background:'#f8fafc', padding:'20px', border:'1px solid #e2e8f0', borderRadius: '8px'}}>
                                    <p>⚙️ PIN de Administrador</p>
                                    <input type="password" value={pinAdmin} onChange={e => setPinAdmin(e.target.value)} placeholder="PIN" style={{marginBottom:'10px'}} />
                                    <input type="password" value={pinAdminConf} onChange={e => setPinAdminConf(e.target.value)} placeholder="Confirmar PIN" />
                                </div>
                            </div>
                        )}
                        {paso === 3 && (
                            <div>
                                <h2>Paso 3 — Plantel Inicial</h2>
                                {renderPlantelSlots(
                                    jugadores.reduce((acc, j) => { if(!acc[j.categoria]) acc[j.categoria] = []; acc[j.categoria].push(j); return acc; }, {}),
                                    (cat) => {
                                        const nombre = prompt(`Nombre para ${NOMBRES_CATS[cat]}:`);
                                        if(nombre) setJugadores([...jugadores, { nombre, categoria: cat, capitan: confirm('¿Es capitán?') }]);
                                    },
                                    (j) => { alert('Para editar, elimina y vuelve a cargar.'); },
                                    (nom, cat) => setJugadores(jugadores.filter(j => j.nombre !== nom))
                                )}
                            </div>
                        )}
                        {error && <div style={{background:'#fee2e2', color:'#991b1b', padding:'12px', borderRadius:'8px', marginTop:'16px'}}>⚠️ {error}</div>}
                        <div style={{display:'flex', gap:'10px', marginTop:'28px'}}>
                            {paso > 1 && <button className="btn btn-danger" onClick={() => setPaso(p => p - 1)} style={{flex:1}}>← Volver</button>}
                            {paso < 3 ? <button className="btn btn-primary" onClick={avanzar} style={{flex:2}}>Siguiente →</button> : <button className="btn btn-success" onClick={guardarConfig} disabled={guardando} style={{flex:2}}>{guardando ? 'Guardando...' : '🚀 Iniciar App'}</button>}
                        </div>
                    </div>
                </div>
            );
        }

        function LoginScreen({ onLogin, config }) {
            const nombreEquipo = config ? config.nombreEquipo : 'Mi Equipo';
            const [selectedRole, setSelectedRole] = useState(null);
            const [pin, setPin] = useState('');

            const handleEnter = () => {
                if (selectedRole === 'jugador') onLogin('jugador');
                else if (selectedRole === 'capitan') { if (pin === config.pinCapitan) onLogin('capitan'); else alert('PIN incorrecto'); } 
                else if (selectedRole === 'admin') { if (pin === config.pinAdmin) onLogin('admin'); else alert('PIN incorrecto'); }
            };

            return (
                <div className="container" style={{maxWidth: '100%', height: '100vh', display: 'flex', flexDirection: 'column', background: 'linear-gradient(135deg, #1a1a1a 0%, #2d2416 100%)', alignItems: 'center', justifyContent: 'center'}}>
                    <div className="login-container">
                        <img src="icon-192.png" alt="Logo" style={{width: '100px', marginBottom: '20px'}} />
                        <h1 style={{color: '#1e3c72', marginBottom: '10px'}}>Bienvenido a {nombreEquipo}</h1>
                        <p style={{color: '#666', marginBottom: '30px'}}>Seleccioná tu perfil para ingresar</p>
                        {!selectedRole ? (
                            <div>
                                <button className="role-btn" onClick={() => { setSelectedRole('jugador'); onLogin('jugador'); }}>👤 Jugador (Sin Clave)</button>
                                <button className="role-btn" onClick={() => setSelectedRole('capitan')}>⭐ Capitán</button>
                                <button className="role-btn" onClick={() => setSelectedRole('admin')}>⚙️ Administrador</button>
                            </div>
                        ) : (
                            <div>
                                <h3>Ingresá el PIN</h3>
                                <input type="password" value={pin} onChange={(e) => setPin(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleEnter()} style={{textAlign: 'center', fontSize: '24px', letterSpacing: '8px', margin: '20px 0'}} autoFocus />
                                <div style={{display: 'flex', gap: '10px'}}><button className="btn btn-primary" style={{flex: 1}} onClick={handleEnter}>Ingresar</button><button className="btn btn-danger" style={{flex: 1}} onClick={() => { setSelectedRole(null); setPin(''); }}>Volver</button></div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        // ── APLICACIÓN PRINCIPAL ──
        function App() {
            const [userRole, setUserRole] = useState(localStorage.getItem(ID_PROYECTO + '_user_role') || null);
            const [activeTab, setActiveTab] = useState('busqueda');
            const [config, setConfig] = useState(null);
            const [setupStatus, setSetupStatus] = useState('loading'); 
            
            const [numEquipos, setNumEquipos] = useState(10);
            const [equipos, setEquipos] = useState([]);
            const [baseEquipos, setBaseEquipos] = useState(EQUIPOS_POR_DEFECTO); 
            const [fechas, setFechas] = useState([]);
            const [posiciones, setPosiciones] = useState({});
            const [resultados, setResultados] = useState({});
            const [crucesFinales, setCrucesFinales] = useState([]);
            const [zonasConfig, setZonasConfig] = useState({ zona1: [], zona2: [] });
            const [playoffAvances, setPlayoffAvances] = useState({});
            const [syncStatus, setSyncStatus] = useState('local');
            const [lastSync, setLastSync] = useState(null);
            const isReceivingData = useRef(false);

            useEffect(() => { if (userRole) localStorage.setItem(ID_PROYECTO + '_user_role', userRole); else localStorage.removeItem(ID_PROYECTO + '_user_role'); }, [userRole]);

            useEffect(() => {
                const verificarSetup = async () => {
                    try {
                        const configLocal = localStorage.getItem(`${ID_PROYECTO}_config`);
                        if (configLocal) { setConfig(JSON.parse(configLocal)); setSetupStatus('ready'); }
                        const configFirebase = await cargarConfigFirebase();
                        if (configFirebase && configFirebase.setupCompletado) { setConfig(configFirebase); setSetupStatus('ready'); localStorage.setItem(`${ID_PROYECTO}_config`, JSON.stringify(configFirebase)); } 
                        else if (!configLocal) { setSetupStatus('needs_setup'); }
                    } catch (e) {
                        const configLocal = localStorage.getItem(`${ID_PROYECTO}_config`);
                        if (configLocal) { setConfig(JSON.parse(configLocal)); setSetupStatus('ready'); } else { setSetupStatus('needs_setup'); }
                    }
                };
                verificarSetup();
            }, []);

            useEffect(() => {
                const cargarDatos = async () => {
                    const datosGuardados = localStorage.getItem(ID_PROYECTO + '_datos');
                    if (datosGuardados) {
                        const datos = JSON.parse(datosGuardados);
                        setNumEquipos(datos.numEquipos || 10); setEquipos(datos.equipos || []); setBaseEquipos(datos.baseEquipos || EQUIPOS_POR_DEFECTO); setFechas(datos.fechas || []); setResultados(datos.resultados || {}); setPosiciones(datos.posiciones || {}); setCrucesFinales(datos.crucesFinales || []); setZonasConfig(datos.zonasConfig || { zona1: [], zona2: [] }); setPlayoffAvances(datos.playoffAvances || {});
                    }
                    try {
                        setSyncStatus('syncing');
                        const datosFirebase = await cargarDesdeFirebase();
                        if (datosFirebase) {
                            isReceivingData.current = true;
                            setNumEquipos(datosFirebase.numEquipos || 10); setEquipos(datosFirebase.equipos || []); setBaseEquipos(datosFirebase.baseEquipos || EQUIPOS_POR_DEFECTO); setFechas(datosFirebase.fechas || []); setResultados(datosFirebase.resultados || {}); setPosiciones(datosFirebase.posiciones || {}); setCrucesFinales(datosFirebase.crucesFinales || []); setZonasConfig(datosFirebase.zonasConfig || { zona1: [], zona2: [] }); setPlayoffAvances(datosFirebase.playoffAvances || {});
                            setLastSync(datosFirebase.ultimaActualizacion); setSyncStatus('synced');
                            localStorage.setItem(ID_PROYECTO + '_datos', JSON.stringify(datosFirebase));
                            setTimeout(() => { isReceivingData.current = false; }, 1000);
                        } else { setSyncStatus('local'); }
                    } catch (e) { setSyncStatus('local'); }
                };
                cargarDatos();

                const unsubscribe = escucharCambiosFirebase((datos) => {
                    if (datos && datos.ultimaActualizacion !== lastSync) {
                        isReceivingData.current = true;
                        setNumEquipos(datos.numEquipos || 10); setEquipos(datos.equipos || []); setBaseEquipos(datos.baseEquipos || EQUIPOS_POR_DEFECTO); setFechas(datos.fechas || []); setResultados(datos.resultados || {}); setPosiciones(datos.posiciones || {}); setCrucesFinales(datos.crucesFinales || []); setZonasConfig(datos.zonasConfig || { zona1: [], zona2: [] }); setPlayoffAvances(datos.playoffAvances || {});
                        setLastSync(datos.ultimaActualizacion); setSyncStatus('synced');
                        localStorage.setItem(ID_PROYECTO + '_datos', JSON.stringify(datos));
                        setTimeout(() => { isReceivingData.current = false; }, 1000);
                    }
                });
                return () => { if (unsubscribe) unsubscribe(); };
            }, []);

            useEffect(() => {
                if (isReceivingData.current) return;
                const datos = { numEquipos, equipos, baseEquipos, fechas, resultados, posiciones, crucesFinales, zonasConfig, playoffAvances };
                localStorage.setItem(ID_PROYECTO + '_datos', JSON.stringify(datos));
                if (userRole !== 'jugador' && (equipos.length > 0 || fechas.length > 0)) {
                    setSyncStatus('syncing');
                    guardarEnFirebase(datos).then((t) => { setSyncStatus('synced'); setLastSync(t); }).catch(() => setSyncStatus('error'));
                }
            }, [numEquipos, equipos, baseEquipos, fechas, resultados, posiciones, crucesFinales, zonasConfig, playoffAvances, userRole]);

            const logout = () => { setUserRole(null); setActiveTab('busqueda'); };

            if (setupStatus === 'loading') return <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#1a1a1a', color:'white'}}>Cargando App...</div>;
            if (setupStatus === 'needs_setup') return <SetupWizard onSetupComplete={(nuevaConfig) => { setConfig(nuevaConfig); setSetupStatus('ready'); localStorage.setItem(`${ID_PROYECTO}_config`, JSON.stringify(nuevaConfig)); }} />;
            if (!userRole) return <LoginScreen onLogin={setUserRole} config={config} />;

            const guardarEquiposSeleccionados = (nombresRivales) => {
                const miEquipoNombre = config ? config.nombreEquipo : 'Mi Equipo';
                setEquipos([{ nombre: miEquipoNombre, esGoat: true }, ...nombresRivales.map(n => ({ nombre: n, esGoat: false }))]);
            };

            const agregarFecha = (numFecha, rival) => {
                const nuevaFecha = { numero: numFecha, rival: rival, partidos: PARTIDOS.map(p => ({ ...p, jugadores: [], horario: '', dia: 'sabado', ganado: false })), partidoBonus: null, categoriasHabilitadas: {}, jugadoresHabilitados: [] };
                const nuevasFechas = [...fechas]; nuevasFechas[numFecha - 1] = nuevaFecha; setFechas(nuevasFechas);
            };

            return (
                <div className="container">
                    <div className="header">
                        <img src="icon-192.png" alt="Logo" />
                        <div className="header-text">
                            <h1>{config ? config.nombreEquipo : 'Mi Equipo'}</h1>
                            <p>{config ? config.descripcion : 'Interclubes'}</p>
                        </div>
                        <div className="user-menu">
                            <span style={{color: '#c5a572'}}>{userRole === 'admin' ? '⚙️ Admin' : userRole === 'capitan' ? '⭐ Capitán' : '👤 Jugador'}</span>
                            <button className="btn btn-danger" onClick={logout}>Salir</button>
                        </div>
                    </div>

                    <div className="tabs">
                        <button className={`tab ${activeTab === 'busqueda' ? 'active' : ''}`} onClick={() => setActiveTab('busqueda')}>Mis Partidos</button>
                        <button className={`tab ${activeTab === 'resultados' ? 'active' : ''}`} onClick={() => setActiveTab('resultados')}>Resultados</button>
                        <button className={`tab ${activeTab === 'tablas' ? 'active' : ''}`} onClick={() => setActiveTab('tablas')}>Tablas</button>
                        <button className={`tab ${activeTab === 'configuracion' ? 'active' : ''}`} onClick={() => setActiveTab('configuracion')}>Configuración</button>
                    </div>

                    <div className="content">
                        {activeTab === 'busqueda' && <BusquedaTab fechas={fechas} plantel={config?.plantel || {}} />}
                        {activeTab === 'resultados' && <ResultadosTab userRole={userRole} fechas={fechas} resultados={resultados} />}
                        {activeTab === 'tablas' && <TablasTab userRole={userRole} equipos={equipos} fechas={fechas} resultados={resultados} crucesFinales={crucesFinales} zonasConfig={zonasConfig} />}
                        {activeTab === 'configuracion' && <ConfiguracionTab userRole={userRole} numEquipos={numEquipos} setNumEquipos={setNumEquipos} equipos={equipos} baseEquipos={baseEquipos} setBaseEquipos={setBaseEquipos} guardarEquiposSeleccionados={guardarEquiposSeleccionados} agregarFecha={agregarFecha} fechas={fechas} zonasConfig={zonasConfig} setZonasConfig={setZonasConfig} config={config} setConfig={setConfig} />}
                    </div>
                </div>
            );
        }

        // ── COMPONENTES INTERNOS ──

        function BusquedaTab({ fechas, plantel }) {
            const [jugadorSeleccionado, setJugadorSeleccionado] = useState('');
            const jugadores = Object.values(plantel).flat().map(j => j.nombre).sort();

            return (
                <div>
                    <h2>Mis Partidos</h2>
                    <select value={jugadorSeleccionado} onChange={(e) => setJugadorSeleccionado(e.target.value)} style={{marginBottom: '20px'}}>
                        <option value="">-- Seleccionar Jugador --</option>
                        {jugadores.map(j => <option key={j} value={j}>{j}</option>)}
                    </select>
                    {jugadorSeleccionado && (
                        <div>
                            {fechas.map((f, i) => {
                                const misPartidos = (f.partidos || []).filter(p => p.jugadores && p.jugadores.includes(jugadorSeleccionado));
                                if (misPartidos.length === 0) return null;
                                return (
                                    <div key={i} className="date-section">
                                        <h4>Fecha {f.numero} vs {f.rival}</h4>
                                        {misPartidos.map(p => <div key={p.id}>{p.tipo} - {p.dia} {p.horario}</div>)}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        }

        function ResultadosTab({ userRole, fechas, resultados }) {
            return (
                <div>
                    <h2>Resultados</h2>
                    {fechas.map((f, i) => (
                        <div key={i} className="date-section">
                            <h4>Fecha {f.numero} vs {f.rival}</h4>
                            <p>Resultados cargados (Solo lectura simplificada aquí)</p>
                        </div>
                    ))}
                </div>
            );
        }

        function TablasTab({ userRole, equipos, fechas, resultados, crucesFinales, zonasConfig }) {
            const miEquipoNombre = (equipos.find(e => e.esGoat) || { nombre: 'Mi Equipo' }).nombre;
            const tablaZ1 = calcularTablaZona(zonasConfig.zona1 || [], fechas, resultados, miEquipoNombre);
            return (
                <div>
                    <h2>Tabla de Zonas</h2>
                    <p>Zona 1</p>
                    <ul>{tablaZ1.map(t => <li key={t.nombre}>{t.nombre}: {t.puntosTotales} pts</li>)}</ul>
                </div>
            );
        }

        function ConfiguracionTab({ userRole, numEquipos, setNumEquipos, equipos, baseEquipos, setBaseEquipos, guardarEquiposSeleccionados, agregarFecha, fechas, zonasConfig, setZonasConfig, config, setConfig }) {
            const [showJugadorModal, setShowJugadorModal] = useState(false);
            const [jugadorEditando, setJugadorEditando] = useState(null);
            const plantelActual = config?.plantel || {};

            const onGuardarJugador = async (data) => {
                const nuevoPlantel = JSON.parse(JSON.stringify(plantelActual));
                if (jugadorEditando) { Object.keys(nuevoPlantel).forEach(cat => { nuevoPlantel[cat] = (nuevoPlantel[cat] || []).filter(j => j.nombre !== jugadorEditando.nombre); }); }
                if (!nuevoPlantel[data.categoria]) nuevoPlantel[data.categoria] = [];
                nuevoPlantel[data.categoria].push(data);
                const nuevaConfig = { ...config, plantel: nuevoPlantel };
                await guardarConfigFirebase(nuevaConfig);
                setConfig(nuevaConfig);
                setShowJugadorModal(false);
            };

            const eliminarJugador = async (nom, cat) => {
                const nuevoPlantel = JSON.parse(JSON.stringify(plantelActual));
                nuevoPlantel[cat] = (nuevoPlantel[cat] || []).filter(j => j.nombre !== nom);
                const nuevaConfig = { ...config, plantel: nuevoPlantel };
                await guardarConfigFirebase(nuevaConfig);
                setConfig(nuevaConfig);
            };

            return (
                <div>
                    <h2>Configuración</h2>
                    {userRole !== 'jugador' && (
                        <div style={{marginBottom: '30px'}}>
                            <h3>Plantel</h3>
                            {renderPlantelSlots(
                                plantelActual,
                                (catKey) => { setJugadorEditando({ nombre: '', categoria: catKey, capitan: false }); setShowJugadorModal(true); },
                                (j) => { setJugadorEditando(j); setShowJugadorModal(true); },
                                eliminarJugador
                            )}
                        </div>
                    )}
                    
                    {showJugadorModal && (
                        <div className="modal" onClick={() => setShowJugadorModal(false)}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <h3>{jugadorEditando?.nombre ? 'Editar' : 'Agregar'} Jugador</h3>
                                <div className="form-group"><label>Nombre</label><input type="text" id="nombreTemp" defaultValue={jugadorEditando?.nombre} /></div>
                                <div className="form-group"><label>Categoría</label>
                                    <select id="catTemp" defaultValue={jugadorEditando?.categoria}>
                                        {CATEGORIAS_DISPONIBLES.map(c => <option key={c.value} value={c.value}>{c.label}</option>)}
                                    </select>
                                </div>
                                <button className="btn btn-primary" onClick={() => onGuardarJugador({ nombre: document.getElementById('nombreTemp').value, categoria: document.getElementById('catTemp').value, capitan: false })}>Guardar</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
