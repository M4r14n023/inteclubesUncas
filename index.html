                                    {fechas.length === 4 && (<div className="success-message">✓ Todas las fechas configuradas. Ir a la pestaña "Fechas" para armar los equipos.</div>)}
                                </div>
                            )}

                            <div style={{marginTop: userRole !== 'jugador' ? '40px' : '0px', paddingTop: userRole !== 'jugador' ? '30px' : '0px', borderTop: userRole !== 'jugador' ? '2px solid #ddd' : 'none'}}>
                                <h3 style={{marginBottom: '20px'}}>Armado de Zonas</h3>
                                
                                {userRole === 'jugador' ? (
                                    <div className="grid-2">
                                        <div style={{background: '#f8f9fa', padding: '20px', borderRadius: '8px', border: '1px solid #e2e8f0'}}>
                                            <h4 style={{marginBottom: '15px', color: '#1e3c72', borderBottom: '2px solid #d4af37', paddingBottom: '5px'}}>Zona 1</h4>
                                            <ul style={{listStyle: 'none', padding: 0}}>
                                                {zonasConfig.zona1.map((eq, idx) => eq ? <li key={idx} style={{padding: '8px 0', borderBottom: '1px solid #ddd', fontWeight: eq===miEquipoNombre?'bold':'normal', color: eq===miEquipoNombre?'#10b981':'#333'}}>{eq} {eq===miEquipoNombre&&'⭐'}</li> : null)}
                                            </ul>
                                        </div>
                                        <div style={{background: '#f8f9fa', padding: '20px', borderRadius: '8px', border: '1px solid #e2e8f0'}}>
                                            <h4 style={{marginBottom: '15px', color: '#1e3c72', borderBottom: '2px solid #d4af37', paddingBottom: '5px'}}>Zona 2</h4>
                                            <ul style={{listStyle: 'none', padding: 0}}>
                                                {zonasConfig.zona2.map((eq, idx) => eq ? <li key={idx} style={{padding: '8px 0', borderBottom: '1px solid #ddd', fontWeight: eq===miEquipoNombre?'bold':'normal', color: eq===miEquipoNombre?'#10b981':'#333'}}>{eq} {eq===miEquipoNombre&&'⭐'}</li> : null)}
                                            </ul>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="grid-2">
                                        <div>
                                            <label><strong>Zona 1</strong></label>
                                            {[0, 1, 2, 3, 4].map(idx => (
                                                <div key={idx} className="form-group">
                                                    <select value={zonasConfig.zona1[idx] || ''} onChange={(e) => { const n = {...zonasConfig}; n.zona1[idx] = e.target.value; setZonasConfig(n); }}>
                                                        <option value="">Seleccionar equipo...</option>
                                                        {equipos.map((eq, eqIdx) => (<option key={eqIdx} value={eq.nombre}>{eq.nombre}</option>))}
                                                    </select>
                                                </div>
                                            ))}
                                        </div>
                                        <div>
                                            <label><strong>Zona 2</strong></label>
                                            {[0, 1, 2, 3, 4].map(idx => (
                                                <div key={idx} className="form-group">
                                                    <select value={zonasConfig.zona2[idx] || ''} onChange={(e) => { const n = {...zonasConfig}; n.zona2[idx] = e.target.value; setZonasConfig(n); }}>
                                                        <option value="">Seleccionar equipo...</option>
                                                        {equipos.map((eq, eqIdx) => (<option key={eqIdx} value={eq.nombre}>{eq.nombre}</option>))}
                                                    </select>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {userRole !== 'jugador' && zonasConfig.zona1.filter(e => e).length === 5 && zonasConfig.zona2.filter(e => e).length === 5 && (
                                    <div style={{marginTop: '20px'}}>
                                        <button className="btn btn-success btn-responsive" onClick={() => setShowAsignarFechasModal(true)}>Generar Cruces de Zonas</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {showAsignarFechasModal && (
                        <AsignarFechasModal zonasConfig={zonasConfig} equipos={equipos} onClose={() => setShowAsignarFechasModal(false)}
                            onGenerar={(crucesGenerados) => {
                                const datosActuales = localStorage.getItem(ID_PROYECTO + '_datos');
                                const datos = datosActuales ? JSON.parse(datosActuales) : {};
                                datos.crucesFinales = crucesGenerados; localStorage.setItem(ID_PROYECTO + '_datos', JSON.stringify(datos));
                                if (window.actualizarCrucesFinales) window.actualizarCrucesFinales(crucesGenerados);
                                setShowAsignarFechasModal(false); alert('Cruces generados exitosamente.');
                            }}
                        />
                    )}
                </div>
            );
        }

        function FechasTab({ userRole, fechas, procesarHorarios, actualizarJugadores, contarPartidosJugador, generarPDF, setFechas }) {
            const [fechaSeleccionada, setFechaSeleccionada] = useState(0);
            const [showHorarioModal, setShowHorarioModal] = useState(false);
            const [horarioActual, setHorarioActual] = useState({ dia: 'sabado', hora: '09:00', partido1: '', partido2: '' });
            const [editandoHorario, setEditandoHorario] = useState(null);
            const [showCategoriasModal, setShowCategoriasModal] = useState(false);
            const [categoriasTemp, setCategoriasTemp] = useState({});
            const [jugadoresHabilitadosTemp, setJugadoresHabilitadosTemp] = useState([]);

            if (fechas.length === 0) return <div className="warning">Por favor, que un Capitán configure primero los equipos y las fechas.</div>;
            const fecha = fechas[fechaSeleccionada];

            const abrirCategoriasModal = () => {
                setCategoriasTemp(fecha.categoriasHabilitadas || { caballeros_5ta_en_4ta: false, caballeros_4ta_en_3ra: false, caballeros_3ra_en_2da: false, damas_c_en_b: false, damas_b_en_a: false });
                setJugadoresHabilitadosTemp(fecha.jugadoresHabilitados || []); setShowCategoriasModal(true);
            };
            const guardarCategorias = () => { const nuevasFechas = [...fechas]; nuevasFechas[fechaSeleccionada].categoriasHabilitadas = categoriasTemp; nuevasFechas[fechaSeleccionada].jugadoresHabilitados = jugadoresHabilitadosTemp; setFechas(nuevasFechas); setShowCategoriasModal(false); };
            const toggleJugadorHabilitado = (nombreJugador, categoriaDestino) => {
                const existe = jugadoresHabilitadosTemp.find(j => j.jugador === nombreJugador && j.categoriaDestino === categoriaDestino);
                if (existe) setJugadoresHabilitadosTemp(jugadoresHabilitadosTemp.filter(j => !(j.jugador === nombreJugador && j.categoriaDestino === categoriaDestino)));
                else setJugadoresHabilitadosTemp([...jugadoresHabilitadosTemp, { jugador: nombreJugador, categoriaDestino }]);
            };

            const getPartidosDisponibles = (excluirPartido = null) => {
                return PARTIDOS.filter(p => {
                    if (editandoHorario) {
                        const partidoDelHorario = fecha.partidos.find(fp => fp.id === p.id && fp.horario === editandoHorario.horario && fp.dia === editandoHorario.dia);
                        if (partidoDelHorario) return true;
                    }
                    if (excluirPartido && p.id === excluirPartido) return false;
                    const partidoAsignado = fecha.partidos.find(fp => fp.id === p.id); return !partidoAsignado.horario;
                });
            };

            const partidosDisponiblesP1 = getPartidosDisponibles(); const partidosDisponiblesP2 = getPartidosDisponibles(parseInt(horarioActual.partido1));

            const agregarHorario = () => {
                if (!horarioActual.partido1 || !horarioActual.partido2) { alert('Debes seleccionar los 2 partidos para este horario'); return; }
                const nuevasFechas = [...fechas]; const fechaIdx = fechaSeleccionada;
                if (editandoHorario) { nuevasFechas[fechaIdx].partidos = nuevasFechas[fechaIdx].partidos.map(p => { if (p.dia === editandoHorario.dia && p.horario === editandoHorario.horario) return { ...p, dia: 'sabado', horario: '', posicion: undefined }; return p; }); }
                const idx1 = nuevasFechas[fechaIdx].partidos.findIndex(p => p.id === parseInt(horarioActual.partido1));
                if (idx1 !== -1) { nuevasFechas[fechaIdx].partidos[idx1].horario = horarioActual.hora; nuevasFechas[fechaIdx].partidos[idx1].dia = horarioActual.dia; nuevasFechas[fechaIdx].partidos[idx1].posicion = 1; }
                const idx2 = nuevasFechas[fechaIdx].partidos.findIndex(p => p.id === parseInt(horarioActual.partido2));
                if (idx2 !== -1) { nuevasFechas[fechaIdx].partidos[idx2].horario = horarioActual.hora; nuevasFechas[fechaIdx].partidos[idx2].dia = horarioActual.dia; nuevasFechas[fechaIdx].partidos[idx2].posicion = 2; }
                setFechas(nuevasFechas); setEditandoHorario(null);
                const partidosSinAsignar = PARTIDOS.filter(p => { const partidoAsignado = nuevasFechas[fechaIdx].partidos.find(fp => fp.id === p.id); return !partidoAsignado.horario; });
                if (partidosSinAsignar.length >= 2) {
                    const horariosUsados = {}; nuevasFechas[fechaIdx].partidos.forEach(p => { if (p.horario) horariosUsados[`${p.dia}-${p.horario}`] = true; });
                    const horariosPosibles = [ { dia: 'sabado', hora: '09:00' }, { dia: 'sabado', hora: '10:30' }, { dia: 'sabado', hora: '12:00' }, { dia: 'sabado', hora: '13:30' }, { dia: 'sabado', hora: '15:00' }, { dia: 'sabado', hora: '16:30' }, { dia: 'sabado', hora: '17:45' }, { dia: 'domingo', hora: '09:00' }, { dia: 'domingo', hora: '10:30' }, { dia: 'domingo', hora: '12:00' }, { dia: 'domingo', hora: '13:30' }, { dia: 'domingo', hora: '15:00' } ];
                    const siguienteHorario = horariosPosibles.find(h => !horariosUsados[`${h.dia}-${h.hora}`]);
                    if (siguienteHorario) setHorarioActual({ dia: siguienteHorario.dia, hora: siguienteHorario.hora, partido1: '', partido2: '' }); 
                    else { setShowHorarioModal(false); setHorarioActual({ dia: 'sabado', hora: '09:00', partido1: '', partido2: '' }); }
                } else { setShowHorarioModal(false); setHorarioActual({ dia: 'sabado', hora: '09:00', partido1: '', partido2: '' }); }
            };

            const eliminarHorario = (dia, hora) => {
                if (confirm(`¿Eliminar los partidos del ${dia} a las ${hora}?`)) {
                    const nuevasFechas = [...fechas]; nuevasFechas[fechaSeleccionada].partidos = nuevasFechas[fechaSeleccionada].partidos.map(p => { if (p.dia === dia && p.horario === hora) return { ...p, dia: 'sabado', horario: '', posicion: undefined }; return p; });
                    setFechas(nuevasFechas);
                }
            };
            const editarHorario = (dia, hora) => {
                const partidos = fecha.partidos.filter(p => p.dia === dia && p.horario === hora);
                if (partidos.length === 2) {
                    const p1 = partidos.find(p => p.posicion === 1); const p2 = partidos.find(p => p.posicion === 2);
                    setHorarioActual({ dia: dia, hora: hora, partido1: p1 ? p1.id.toString() : '', partido2: p2 ? p2.id.toString() : '' });
                    setEditandoHorario({ dia, horario: hora }); setShowHorarioModal(true);
                }
            };

            const partidosPorHorario = {};
            fecha.partidos.forEach(partido => { if (partido.horario) { const key = `${partido.dia}-${partido.horario}`; if (!partidosPorHorario[key]) partidosPorHorario[key] = { dia: partido.dia, hora: partido.horario, partidos: [] }; partidosPorHorario[key].partidos.push(partido); } });
            const partidosSinAsignar = PARTIDOS.filter(p => { const partidoAsignado = fecha.partidos.find(fp => fp.id === p.id); return !partidoAsignado.horario; });
            const categoriasHabilitadasCount = fecha.jugadoresHabilitados ? fecha.jugadoresHabilitados.length : 0;

            return (
                <div>
                    <h2 style={{marginBottom: '20px', color: '#1e3c72'}}>Convocatorias</h2>
                    
                    <div style={{display: 'flex', gap: '10px', marginBottom: '25px', flexWrap: 'wrap'}}>
                        {fechas.map((f, idx) => (
                            <button 
                                key={idx} className={`btn ${fechaSeleccionada === idx ? 'btn-primary' : ''}`}
                                style={{ background: fechaSeleccionada === idx ? '#d4af37' : '#e2e8f0', color: fechaSeleccionada === idx ? '#1a1a1a' : '#475569', margin: 0, flex: '1 1 calc(50% - 10px)', minWidth: '130px', padding: '10px' }}
                                onClick={() => setFechaSeleccionada(idx)}
                            >
                                Fecha {f.numero} <br/><span style={{fontSize: '13px', fontWeight: 'normal'}}>vs {f.rival}</span>
                            </button>
                        ))}
                    </div>

                    <div className="date-section">
                        <div className="date-header">Fecha {fecha.numero} - vs {fecha.rival}</div>
                        
                        {userRole !== 'jugador' && (
                            <>
                                <div style={{marginBottom: '15px', padding: '12px', background: '#f0f9ff', borderRadius: '8px', border: '1px solid #0ea5e9'}}>
                                    <strong>Partidos sin asignar: {partidosSinAsignar.length} de 26</strong>
                                </div>
                                <div style={{marginBottom: '15px'}}>
                                    <label style={{display: 'flex', alignItems: 'center', gap: '10px', cursor: 'pointer'}}>
                                        <input type="checkbox" checked={categoriasHabilitadasCount > 0} onChange={abrirCategoriasModal} />
                                        <span>Habilitar jugadores de categorías inferiores en superiores</span>
                                    </label>
                                    {categoriasHabilitadasCount > 0 && (<div style={{marginTop: '8px', fontSize: '14px', color: '#10b981', fontWeight: '600'}}>✓ {categoriasHabilitadasCount} jugador(es) habilitado(s) en categorías superiores</div>)}
                                </div>
                                <button className="btn btn-primary btn-responsive" onClick={() => {
                                    setEditandoHorario(null);
                                    const horariosUsados = {}; fecha.partidos.forEach(p => { if (p.horario) horariosUsados[`${p.dia}-${p.horario}`] = true; });
                                    const horariosPosibles = [ { dia: 'sabado', hora: '09:00' }, { dia: 'sabado', hora: '10:30' }, { dia: 'sabado', hora: '12:00' }, { dia: 'sabado', hora: '13:30' }, { dia: 'sabado', hora: '15:00' }, { dia: 'sabado', hora: '16:30' }, { dia: 'sabado', hora: '17:45' }, { dia: 'domingo', hora: '09:00' }, { dia: 'domingo', hora: '10:30' }, { dia: 'domingo', hora: '12:00' }, { dia: 'domingo', hora: '13:30' }, { dia: 'domingo', hora: '15:00' } ];
                                    const siguienteHorario = horariosPosibles.find(h => !horariosUsados[`${h.dia}-${h.hora}`]);
                                    if (siguienteHorario) setHorarioActual({ dia: siguienteHorario.dia, hora: siguienteHorario.hora, partido1: '', partido2: '' }); else setHorarioActual({ dia: 'sabado', hora: '09:00', partido1: '', partido2: '' });
                                    setShowHorarioModal(true);
                                }}>➕ Agregar Horario</button>
                                
                                <div className="form-group" style={{marginTop: '20px'}}>
                                    <label>Partido Bonus (vale 20 puntos)</label>
                                    <select value={fecha.partidoBonus || ''} onChange={(e) => { const nuevasFechas = [...fechas]; nuevasFechas[fechaSeleccionada].partidoBonus = e.target.value ? parseInt(e.target.value) : null; setFechas(nuevasFechas); }}>
                                        <option value="">Seleccionar partido bonus...</option>
                                        {PARTIDOS.map(p => (<option key={p.id} value={p.id}>{p.tipo}</option>))}
                                    </select>
                                </div>
                            </>
                        )}
                        {userRole === 'jugador' && fecha.partidoBonus && (
                            <div style={{marginTop: '10px', padding: '10px', background: '#fffbeb', borderRadius: '8px', border: '1px solid #f59e0b', color: '#92400e', fontWeight: 'bold'}}>
                                ⭐ Partido Bonus de esta fecha: {PARTIDOS.find(p=>p.id===fecha.partidoBonus)?.tipo}
                            </div>
                        )}

                        <button className="btn btn-success btn-responsive" onClick={() => generarPDF(fechaSeleccionada)} style={{marginTop: '20px'}}>📄 Descargar Convocatoria (PDF)</button>
                    </div>

                    {showCategoriasModal && ( <ModalCategorias categoriasTemp={categoriasTemp} setCategoriasTemp={setCategoriasTemp} jugadoresHabilitadosTemp={jugadoresHabilitadosTemp} toggleJugadorHabilitado={toggleJugadorHabilitado} guardarCategorias={guardarCategorias} setShowCategoriasModal={setShowCategoriasModal} /> )}

                    {showHorarioModal && (
                        <div className="modal" onClick={() => { if (confirm('¿Cerrar sin guardar?')) { setShowHorarioModal(false); setHorarioActual({ dia: 'sabado', hora: '09:00', partido1: '', partido2: '' }); setEditandoHorario(null); } }}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <div className="modal-header">{editandoHorario ? 'Editar Horario' : `Agregar Horario (${partidosSinAsignar.length} partidos restantes)`}</div>
                                <div className="form-group"><label>Día</label><select value={horarioActual.dia} onChange={(e) => setHorarioActual({...horarioActual, dia: e.target.value})}><option value="sabado">Sábado</option><option value="domingo">Domingo</option></select></div>
                                <div className="form-group">
                                    <label>Horario</label>
                                    <select value={horarioActual.hora} onChange={(e) => setHorarioActual({...horarioActual, hora: e.target.value})}>
                                        <option value="09:00">09:00</option><option value="10:30">10:30</option><option value="12:00">12:00</option>
                                        <option value="13:30">13:30</option><option value="15:00">15:00</option><option value="16:30">16:30</option>
                                        {horarioActual.dia === 'sabado' && <option value="17:45">17:45</option>}
                                    </select>
                                </div>
                                <div className="form-group"><label>Partido 1</label><select value={horarioActual.partido1} onChange={(e) => setHorarioActual({...horarioActual, partido1: e.target.value})}><option value="">Seleccionar partido...</option>{partidosDisponiblesP1.map(p => (<option key={p.id} value={p.id}>{p.tipo}</option>))}</select></div>
                                <div className="form-group"><label>Partido 2</label><select value={horarioActual.partido2} onChange={(e) => setHorarioActual({...horarioActual, partido2: e.target.value})} disabled={!horarioActual.partido1}><option value="">Seleccionar partido...</option>{partidosDisponiblesP2.map(p => (<option key={p.id} value={p.id}>{p.tipo}</option>))}</select></div>
                                <div className="flex-mobile-col" style={{display: 'flex', gap: '10px', marginTop: '20px'}}>
                                    <button className="btn btn-primary btn-responsive" onClick={agregarHorario}>{editandoHorario ? 'Actualizar' : partidosSinAsignar.length > 2 ? 'Guardar y Continuar' : 'Guardar'}</button>
                                    <button className="btn btn-danger btn-responsive" onClick={() => { setShowHorarioModal(false); setHorarioActual({ dia: 'sabado', hora: '09:00', partido1: '', partido2: '' }); setEditandoHorario(null); }}>Cancelar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div style={{marginTop: '30px'}}>
                        <h3 style={{marginBottom: '15px', color: '#1e3c72'}}>Cronograma</h3>
                        {Object.keys(partidosPorHorario).length === 0 && <div className="warning" style={{background: 'white', border: '1px solid #ddd'}}>Aún no hay horarios asignados en esta fecha.</div>}
                        {Object.values(partidosPorHorario).sort((a, b) => { if (a.dia !== b.dia) return a.dia === 'sabado' ? -1 : 1; return a.hora.localeCompare(b.hora); }).map((horario, idx) => (
                            <div key={idx} style={{ background: '#f8f9fa', padding: '15px', borderRadius: '8px', marginBottom: '15px', border: '2px solid #ddd' }}>
                                <div className="flex-mobile-col" style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px', gap:'10px'}}>
                                    <strong style={{fontSize: '16px', color: '#1e3c72'}}>{horario.dia === 'sabado' ? 'Sábado' : 'Domingo'} - {horario.hora}</strong>
                                    {userRole !== 'jugador' && (
                                        <div style={{display: 'flex', gap:'5px'}}>
                                            <button className="btn btn-primary" style={{padding: '6px 12px', fontSize: '14px', margin: '0'}} onClick={() => editarHorario(horario.dia, horario.hora)}>✏️ Editar</button>
                                            <button className="btn btn-danger" style={{padding: '6px 12px', fontSize: '14px', margin: '0'}} onClick={() => eliminarHorario(horario.dia, horario.hora)}>🗑️</button>
                                        </div>
                                    )}
                                </div>
                                {horario.partidos.sort((a, b) => (a.posicion || 0) - (b.posicion || 0)).map(partido => (
                                    <div key={partido.id} style={{ background: 'white', padding: '10px', borderRadius: '6px', marginBottom: '8px', border: fecha.partidoBonus === partido.id ? '2px solid #f59e0b' : '1px solid #e5e7eb' }}>
                                        <strong>Partido {partido.posicion}: {partido.tipo}</strong>
                                        {fecha.partidoBonus === partido.id && <span style={{color: '#f59e0b', marginLeft: '10px'}}>⭐ BONUS</span>}
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>

                    <div className="match-grid" style={{marginTop: '30px'}}>
                        <h3 style={{marginBottom: '15px', color: '#1e3c72'}}>Asignación de Jugadores</h3>
                        {fecha.partidos.filter(p => p.horario).sort((a, b) => { if (a.dia !== b.dia) return a.dia === 'sabado' ? -1 : 1; if (a.horario !== b.horario) return a.horario.localeCompare(b.horario); return (a.posicion || 0) - (b.posicion || 0); }).map(partido => (
                            <PartidoCard 
                                key={partido.id} partido={partido} fechaIndex={fechaSeleccionada} fecha={fecha} userRole={userRole}
                                actualizarJugadores={actualizarJugadores} contarPartidosJugador={contarPartidosJugador} esBonus={fecha.partidoBonus === partido.id}
                            />
                        ))}
                    </div>
                </div>
            );
        }

        function ModalCategorias({categoriasTemp, setCategoriasTemp, jugadoresHabilitadosTemp, toggleJugadorHabilitado, guardarCategorias, setShowCategoriasModal}) {
            return (
                <div className="modal" onClick={() => {}}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()} style={{maxWidth: '700px'}}>
                        <div className="modal-header">Habilitar Jugadores en Categorías Superiores</div>
                        <p style={{marginBottom: '20px', color: '#666'}}>Los jugadores habilitados NO contarán en el límite de 3 partidos cuando jueguen en categoría superior.</p>

                        <div style={{marginBottom: '20px', padding: '15px', background: '#f8f9fa', borderRadius: '8px'}}>
                            <label style={{display: 'flex', alignItems: 'center', gap: '10px', fontWeight: '700', marginBottom: '10px'}}><input type="checkbox" checked={categoriasTemp.caballeros_5ta_en_4ta || false} onChange={(e) => setCategoriasTemp({...categoriasTemp, caballeros_5ta_en_4ta: e.target.checked})} /> Caballeros 5ta → 4ta</label>
                            {categoriasTemp.caballeros_5ta_en_4ta && (<div style={{marginLeft: '30px'}}>{JUGADORES_GOAT.caballeros_5ta.map(j => (<label key={j.nombre} style={{display: 'block', marginBottom: '5px'}}><input type="checkbox" checked={jugadoresHabilitadosTemp.some(jh => jh.jugador === j.nombre && jh.categoriaDestino === 'caballeros_4ta')} onChange={() => toggleJugadorHabilitado(j.nombre, 'caballeros_4ta')} /> {j.nombre}</label>))}</div>)}
                        </div>
                        <div style={{marginBottom: '20px', padding: '15px', background: '#f8f9fa', borderRadius: '8px'}}>
                            <label style={{display: 'flex', alignItems: 'center', gap: '10px', fontWeight: '700', marginBottom: '10px'}}><input type="checkbox" checked={categoriasTemp.caballeros_4ta_en_3ra || false} onChange={(e) => setCategoriasTemp({...categoriasTemp, caballeros_4ta_en_3ra: e.target.checked})} /> Caballeros 4ta → 3ra</label>

        function PartidoCard({ partido, fechaIndex, fecha, actualizarJugadores, contarPartidosJugador, esBonus, userRole }) {
            const [jugadoresSeleccionados, setJugadoresSeleccionados] = useState(partido.jugadores || []);
            useEffect(() => { setJugadoresSeleccionados(partido.jugadores || []); }, [partido.jugadores]);

            const jugadoresHabilitados = fecha.jugadoresHabilitados || [];
            const jugadoresDisponibles = partido.categorias.flatMap(cat => {
                const jugadoresBase = JUGADORES_GOAT[cat] || [];
                const jugadoresExtra = jugadoresHabilitados.filter(jh => jh.categoriaDestino === cat).map(jh => {
                    const jugadorOriginal = Object.values(JUGADORES_GOAT).flat().find(j => j.nombre === jh.jugador);
                    return { ...jugadorOriginal, esHabilitado: true, categoriaOriginal: jugadorOriginal.categoria };
                });
                return [...jugadoresBase, ...jugadoresExtra];
            });

            const agregarJugador = (nombreJugador) => {
                if (jugadoresSeleccionados.length >= partido.numJugadores) { alert(`Este partido solo permite ${partido.numJugadores} jugador(es)`); return; }
                const jugadorInfo = jugadoresDisponibles.find(j => j.nombre === nombreJugador);
                const estaHabilitado = jugadorInfo && jugadorInfo.esHabilitado;
                
                if (!estaHabilitado) {
                    const countPartidos = contarPartidosJugador(fechaIndex, nombreJugador);
                    if (countPartidos >= 3) { alert(`${nombreJugador} ya está convocado para 3 partidos. No puede jugar más.`); return; }
                }

                const nuevosJugadores = [...jugadoresSeleccionados, nombreJugador];
                setJugadoresSeleccionados(nuevosJugadores); actualizarJugadores(fechaIndex, partido.id, nuevosJugadores);
            };

            const eliminarJugador = (index) => {
                const nuevosJugadores = jugadoresSeleccionados.filter((_, i) => i !== index);
                setJugadoresSeleccionados(nuevosJugadores); actualizarJugadores(fechaIndex, partido.id, nuevosJugadores);
            };

            return (
                <div className={`match-card ${esBonus ? 'bonus' : ''}`}>
                    <div className="match-header">
                        <div>
                            <div className="match-type">{partido.tipo}</div>
                            {esBonus && <div style={{color: '#f59e0b', fontSize: '14px', fontWeight: '600'}}>⭐ PARTIDO BONUS (20 pts)</div>}
                        </div>
                        <div className="match-time">{partido.dia === 'sabado' ? 'Sáb' : 'Dom'} {partido.horario} - P{partido.posicion}</div>
                    </div>

                    <div style={{marginBottom: '10px'}}>
                        <strong>Jugadores asignados:</strong> {jugadoresSeleccionados.length === 0 && <span style={{color: '#999'}}> Ninguno</span>}
                        <div style={{marginTop: '8px'}}>
                            {jugadoresSeleccionados.map((jugador, idx) => {
                                const jugadorObj = jugadoresDisponibles.find(j => j.nombre === jugador);
                                const esHabilitado = jugadorObj && jugadorObj.esHabilitado;
                                return (
                                    <div key={idx} style={{ display: 'inline-block', background: esHabilitado ? '#10b981' : '#667eea', color: 'white', padding: '5px 12px', borderRadius: '6px', marginRight: '8px', marginBottom: '8px' }}>
                                        {jugador} {jugadorObj?.capitan && <span className="captain-badge">CAPITÁN</span>}
                                        {esHabilitado && <span style={{ background: 'rgba(255,255,255,0.3)', padding: '2px 6px', borderRadius: '4px', fontSize: '10px', marginLeft: '6px' }}>↑</span>}
                                        {userRole !== 'jugador' && (
                                            <button onClick={() => eliminarJugador(idx)} style={{ marginLeft: '8px', background: 'rgba(255,255,255,0.3)', border: 'none', color: 'white', borderRadius: '4px', cursor: 'pointer', padding: '2px 6px' }}>✕</button>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {userRole !== 'jugador' && jugadoresSeleccionados.length < partido.numJugadores && (
                        <div className="form-group" style={{marginBottom: '0'}}>
                            <label>Agregar jugador:</label>
                            <select onChange={(e) => { if (e.target.value) { agregarJugador(e.target.value); e.target.value = ''; } }} defaultValue="">
                                <option value="">Seleccionar...</option>
                                {jugadoresDisponibles.filter(j => !jugadoresSeleccionados.includes(j.nombre)).map((j, idx) => {
                                    const count = contarPartidosJugador(fechaIndex, j.nombre);
                                    return ( <option key={idx} value={j.nombre}>{j.nombre} {j.capitan ? '(CAPITÁN)' : ''} {j.esHabilitado ? '↑ ' : `- ${count}/3 partidos`}</option> );
                                })}
                            </select>
                        </div>
                    )}

                    {jugadoresSeleccionados.some(j => {
                        const jugadorObj = jugadoresDisponibles.find(jd => jd.nombre === j);
                        if (jugadorObj && jugadorObj.esHabilitado) return false; 
                        return contarPartidosJugador(fechaIndex, j) > 3;
                    }) && (<div className="player-count-warning">⚠️ Advertencia: Algún jugador supera el límite de 3 partidos</div>)}
                </div>
            );
        }

        function ResultadosTab({ userRole, fechas, resultados, toggleResultado, zonasConfig, crucesFinales, playoffAvances, setPlayoffAvances }) {

                fecha.partidos.forEach(partido => {
                    if (partido.jugadores && partido.jugadores.length > 0) {
                        const key = `${fechaIdx}-${partido.id}`; const ganado = resultados[key] || false; const esBonus = fecha.partidoBonus === partido.id; const puntos = esBonus ? 20 : 10;
                        if (ganado) { ganados++; puntosGanados += puntos; } else { perdidos++; puntosPerdidos += puntos; }
                    }
                });
                return { ganados, perdidos, puntosGanados, puntosPerdidos };

                    {showPlayOffModal && (<PlayOffModal userRole={userRole} equipos={equipos} fechas={fechas} resultados={resultados} zonasConfig={zonasConfig} crucesFinales={crucesFinales} playoffAvances={playoffAvances} setPlayoffAvances={setPlayoffAvances} onClose={() => setShowPlayOffModal(false)} />)}
                    
                    {fechas.map((fecha, fechaIdx) => {

                                <div className="flex-mobile-col" style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', userSelect: 'none', gap: '15px'}} onClick={() => toggleFecha(fechaIdx)}>
                                    <div style={{display: 'flex', alignItems: 'center', gap: '15px'}}>
                                        <span style={{color: '#d4af37', fontSize: '18px', transition: 'transform 0.3s', display: 'inline-block', transform: isExpanded ? 'rotate(90deg)' : 'rotate(0deg)'}}>▶</span>
                                        <div className="date-header" style={{marginBottom: 0}}>Fecha {fecha.numero} - vs {fecha.rival}</div>
                                    </div>
                                    {total > 0 && (
                                        <div style={{ background: resultado.puntosGanados > resultado.puntosPerdidos ? '#d1fae5' : resultado.puntosGanados < resultado.puntosPerdidos ? '#fee2e2' : '#fef3c7', padding: '6px 15px', borderRadius: '8px', border: `2px solid ${resultado.puntosGanados > resultado.puntosPerdidos ? '#10b981' : resultado.puntosGanados < resultado.puntosPerdidos ? '#ef4444' : '#f59e0b'}`, fontWeight: '700', fontSize: '14px', textAlign: 'center' }}>
                                            <div style={{color: '#1e3c72'}}>Puntos: {resultado.puntosGanados} - {resultado.puntosPerdidos}</div>
                                        </div>
                                    )}
                                </div>
                                
                                {isExpanded && (
                                    <div style={{marginTop: '20px', borderTop: '1px dashed #cbd5e1', paddingTop: '20px'}}>
                                        {fecha.partidos && fecha.partidos.filter(partido => partido.jugadores && partido.jugadores.length > 0).sort((a, b) => { if (a.dia !== b.dia) return a.dia === 'sabado' ? -1 : 1; if (a.horario !== b.horario) return a.horario.localeCompare(b.horario); return (a.posicion || 0) - (b.posicion || 0); }).map(partido => {
                                            const key = `${fechaIdx}-${partido.id}`; const ganado = resultados[key] || false; const esBonus = fecha.partidoBonus === partido.id;
                                            return (
                                                <div key={partido.id} style={{ background: ganado ? '#d1fae5' : '#fee2e2', padding: '15px', borderRadius: '8px', marginBottom: '10px', border: esBonus ? '2px solid #f59e0b' : '2px solid transparent' }}>
                                                    <div className="flex-mobile-col" style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '15px'}}>
                                                        <div>
                                                            <div style={{fontSize: '12px', color: '#666', marginBottom: '4px'}}>{partido.dia === 'sabado' ? 'Sábado' : 'Domingo'} {partido.horario} - Partido {partido.posicion}</div>
                                                            <strong>{partido.tipo}</strong> {esBonus && <span style={{color: '#f59e0b', marginLeft: '10px'}}>⭐ BONUS (20 pts)</span>} {!esBonus && <span style={{color: '#666', marginLeft: '10px', fontSize: '14px'}}>(10 pts)</span>}
                                                            <div style={{fontSize: '14px', marginTop: '5px'}}>{partido.jugadores.join(' / ')}</div>
                                                        </div>
                                                        <div className="checkbox-container" style={{margin: 0}}>

        const MatchRow = ({ label, eq1, eq2, matchKey, selected, onAdvance, disabled }) => (
            <div style={{ display: 'flex', alignItems: 'center', background: '#f8f9fa', padding: '10px', borderRadius: '8px', marginBottom: '8px', border: '1px solid #e5e7eb', minWidth: '450px' }}>
                <div style={{ width: '80px', fontSize: '11px', fontWeight: 'bold', color: '#1e3c72', textTransform: 'uppercase' }}>{label}</div>
                <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: '8px' }}>
                    <span style={{ fontWeight: selected === eq1 && eq1 ? 'bold' : 'normal', color: eq1 && !eq1.startsWith('Ganador') ? '#1a1a1a' : '#9ca3af' }}>{eq1 || 'TBD'}</span>
                    <button onClick={() => !disabled && eq1 && !eq1.startsWith('Ganador') ? onAdvance(matchKey, eq1) : null} style={{ background: 'none', border: 'none', cursor: (!disabled && eq1 && !eq1.startsWith('Ganador')) ? 'pointer' : 'default', fontSize: '18px', opacity: eq1 && !eq1.startsWith('Ganador') ? 1 : 0.3 }} title="Avanzar equipo">
                        {selected === eq1 && eq1 ? '✅' : '⬜'}

                        {selected === eq2 && eq2 ? '✅' : '⬜'}
                    </button>
                    <span style={{ fontWeight: selected === eq2 && eq2 ? 'bold' : 'normal', color: eq2 && !eq2.startsWith('Ganador') ? '#1a1a1a' : '#9ca3af' }}>{eq2 || 'TBD'}</span>
                </div>
            </div>
        );

        function PlayOffModal({ userRole, equipos, fechas, resultados, zonasConfig, crucesFinales, playoffAvances, setPlayoffAvances, onClose }) {
            const miEquipoNombre = (equipos && equipos.find(e => e.esGoat) || { nombre: 'Mi Equipo' }).nombre;

            const calcularTablaZona = (zona) => {
                const equiposZona = zona === 1 ? zonasConfig.zona1 : zonasConfig.zona2;
                const tabla = {};
                equiposZona.forEach((equipo, index) => { if (equipo) tabla[equipo] = { nombre: equipo, partidos: 0, ganados: 0, perdidos: 0, puntosFavor: 0, puntosContra: 0, diferencia: 0, puntosTotales: 0, originalIndex: index }; });
                fechas.forEach((fecha, fechaIdx) => {
                    if (!fecha || !fecha.partidos) return;
                    const rival = fecha.rival;
                    if (tabla[miEquipoNombre] && tabla[rival]) {
                        let puntosMio = 0; let puntosRival = 0;
                        fecha.partidos.forEach(partido => {
                            if (partido.jugadores && partido.jugadores.length > 0) {
                                const key = `${fechaIdx}-${partido.id}`; const ganado = resultados[key] || false; const esBonus = fecha.partidoBonus === partido.id; const puntos = esBonus ? 20 : 10;
                                if (ganado) puntosMio += puntos; else puntosRival += puntos;
                            }
                        });
                        tabla[miEquipoNombre].partidos++; tabla[miEquipoNombre].puntosFavor += puntosMio; tabla[miEquipoNombre].puntosContra += puntosRival; tabla[miEquipoNombre].puntosTotales += puntosMio; if (puntosMio > puntosRival) tabla[miEquipoNombre].ganados++; else if (puntosMio < puntosRival) tabla[miEquipoNombre].perdidos++; tabla[miEquipoNombre].diferencia = tabla[miEquipoNombre].puntosFavor - tabla[miEquipoNombre].puntosContra;
                        tabla[rival].partidos++; tabla[rival].puntosFavor += puntosRival; tabla[rival].puntosContra += puntosMio; tabla[rival].puntosTotales += puntosRival; if (puntosRival > puntosMio) tabla[rival].ganados++; else if (puntosRival < puntosMio) tabla[rival].perdidos++; tabla[rival].diferencia = tabla[rival].puntosFavor - tabla[rival].puntosContra;
                    }
                });
                crucesFinales.forEach(cruce => {
                    if (tabla[cruce.equipo1] && tabla[cruce.equipo2]) {
                        const pts1 = parseInt(cruce.resultado1) || 0; const pts2 = parseInt(cruce.resultado2) || 0;
                        if (pts1 > 0 || pts2 > 0) {
                            tabla[cruce.equipo1].partidos++; tabla[cruce.equipo1].puntosFavor += pts1; tabla[cruce.equipo1].puntosContra += pts2; tabla[cruce.equipo1].puntosTotales += pts1;
                            tabla[cruce.equipo2].partidos++; tabla[cruce.equipo2].puntosFavor += pts2; tabla[cruce.equipo2].puntosContra += pts1; tabla[cruce.equipo2].puntosTotales += pts2;
                            if (pts1 > pts2) { tabla[cruce.equipo1].ganados++; tabla[cruce.equipo2].perdidos++; } else if (pts2 > pts1) { tabla[cruce.equipo2].ganados++; tabla[cruce.equipo1].perdidos++; }
                            tabla[cruce.equipo1].diferencia = tabla[cruce.equipo1].puntosFavor - tabla[cruce.equipo1].puntosContra; tabla[cruce.equipo2].diferencia = tabla[cruce.equipo2].puntosFavor - tabla[cruce.equipo2].puntosContra;
                        }
                    }
                });
                return Object.values(tabla).sort((a, b) => { if (b.puntosTotales !== a.puntosTotales) return b.puntosTotales - a.puntosTotales; if (b.diferencia !== a.diferencia) return b.diferencia - a.diferencia; return a.originalIndex - b.originalIndex; });
            };

            const tablaZ1 = calcularTablaZona(1); const tablaZ2 = calcularTablaZona(2);
            if (tablaZ1.length < 5 || tablaZ2.length < 5) {
                return ( <div className="modal" onClick={onClose}><div className="modal-content" onClick={(e) => e.stopPropagation()}><div className="modal-header">🏆 Play-Off Proyectado</div><div className="warning">Por favor, configurá las zonas completas en la pestaña "Configuración" (5 equipos por zona) para poder ver la llave de Play-Offs.</div><button className="btn btn-danger btn-responsive" onClick={onClose}>Cerrar</button></div></div> );
            }

            const eqZ1 = tablaZ1.map(t => t.nombre); const eqZ2 = tablaZ2.map(t => t.nombre);
            const octA_1 = eqZ1[3]; const octA_2 = eqZ2[4]; const octB_1 = eqZ2[3]; const octB_2 = eqZ1[4];
            const ganOctA = (playoffAvances.octA === octA_1 || playoffAvances.octA === octA_2) ? playoffAvances.octA : null;
            const ganOctB = (playoffAvances.octB === octB_1 || playoffAvances.octB === octB_2) ? playoffAvances.octB : null;
            const cua1_1 = eqZ1[0]; const cua1_2 = ganOctB || 'Ganador 8vos B'; const cua2_1 = eqZ1[1]; const cua2_2 = eqZ2[2];
            const cua3_1 = eqZ1[2]; const cua3_2 = eqZ2[1]; const cua4_1 = ganOctA || 'Ganador 8vos A'; const cua4_2 = eqZ2[0];
            const ganCua1 = (playoffAvances.cua1 === cua1_1 || playoffAvances.cua1 === cua1_2) ? playoffAvances.cua1 : null;
            const ganCua2 = (playoffAvances.cua2 === cua2_1 || playoffAvances.cua2 === cua2_2) ? playoffAvances.cua2 : null;
            const ganCua3 = (playoffAvances.cua3 === cua3_1 || playoffAvances.cua3 === cua3_2) ? playoffAvances.cua3 : null;
            const ganCua4 = (playoffAvances.cua4 === cua4_1 || playoffAvances.cua4 === cua4_2) ? playoffAvances.cua4 : null;
            const semi1_1 = ganCua1 || 'Ganador Cruce 1'; const semi1_2 = ganCua3 || 'Ganador Cruce 3';
            const semi2_1 = ganCua2 || 'Ganador Cruce 2'; const semi2_2 = ganCua4 || 'Ganador Cruce 4';
            const ganSemi1 = (playoffAvances.semi1 === semi1_1 || playoffAvances.semi1 === semi1_2) ? playoffAvances.semi1 : null;

                                        return (
                                            <tr key={nombre}>
                                                {idx === 0 && (<td rowSpan={jugadores.length} style={{ fontWeight: '700', background: '#f0f9ff', verticalAlign: 'middle' }}>{categoria}</td>)}
                                                <td><strong>{nombre}</strong></td>
                                                <td>{data.singles.ganados} / {data.singles.perdidos}</td>
                                                <td>{data.dobles.ganados} / {data.dobles.perdidos}</td>
                                                <td>{data.total.ganados} / {data.total.perdidos}</td>
                                                <td>{porcentaje}%</td>
                                            </tr>
                                        );
                                    })
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
